<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Avoca CS Team — Call Hours Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0f1a;
    color: #e2e8f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    padding: 24px 20px 48px;
  }
  h1 {
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #f1f5f9;
    margin-bottom: 4px;
  }
  .subtitle {
    font-size: 0.85rem;
    color: #94a3b8;
    margin-bottom: 28px;
  }
  .card {
    background: #13162b;
    border: 1px solid #252847;
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 24px;
  }
  .card-title {
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #64748b;
    margin-bottom: 16px;
  }
  .legend {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.82rem;
    color: #cbd5e1;
  }
  .legend-dot {
    width: 12px; height: 12px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .chart-wrap {
    position: relative;
    width: 100%;
    overflow-x: auto;
  }
  .chart-inner {
    position: relative;
    min-width: 700px;
  }
  .sort-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    align-items: center;
  }
  .sort-bar span {
    font-size: 0.78rem;
    color: #64748b;
    margin-right: 4px;
  }
  .sort-btn {
    background: #1e2140;
    border: 1px solid #2d3260;
    color: #94a3b8;
    font-size: 0.75rem;
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .sort-btn:hover { background: #252847; color: #e2e8f0; }
  .sort-btn.active { background: #6366f1; border-color: #6366f1; color: #fff; }
  .tbl-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.84rem;
    min-width: 520px;
  }
  thead th {
    text-align: left;
    padding: 8px 12px;
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #64748b;
    border-bottom: 1px solid #252847;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  thead th:hover { color: #94a3b8; }
  thead th.sort-asc::after { content: " \25B2"; font-size: 0.65rem; }
  thead th.sort-desc::after { content: " \25BC"; font-size: 0.65rem; }
  tbody tr {
    border-bottom: 1px solid #1a1d35;
    transition: background 0.1s;
  }
  tbody tr:hover { background: #181b33; }
  tbody td { padding: 9px 12px; }
  .name-cell { font-weight: 500; color: #f1f5f9; }
  .hrs-cell { color: #e2e8f0; font-variant-numeric: tabular-nums; }
  .warn-cell { color: #ef4444; font-weight: 600; font-size: 0.78rem; }
  .ok-cell { color: #374163; }
  .w1 { color: #6366f1; }
  .w2 { color: #10b981; }
  .w3 { color: #f59e0b; }
  .total-cell { color: #94a3b8; font-variant-numeric: tabular-nums; }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 16px;
  }
  .stat-box {
    background: #0f1225;
    border: 1px solid #1e2140;
    border-radius: 8px;
    padding: 14px 16px;
  }
  .stat-label {
    font-size: 0.72rem;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 6px;
  }
  .stat-value {
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .stat-sub {
    font-size: 0.72rem;
    color: #64748b;
    margin-top: 2px;
  }
  .generated {
    font-size: 0.72rem;
    color: #374163;
    text-align: right;
    margin-top: 16px;
  }
</style>
</head>
<body>

<h1>Avoca CS Team &mdash; Call Hours</h1>
<p class="subtitle">3-week view &nbsp;&middot;&nbsp; W1: Jun 8&ndash;14 &nbsp;&middot;&nbsp; W2: Jun 15&ndash;21 &nbsp;&middot;&nbsp; W3: Jun 22&ndash;28, 2026</p>

<div class="card">
  <div class="card-title">Team Summary (26 active members)</div>
  <div class="stats-grid" id="statsGrid"></div>
</div>

<div class="card">
  <div class="card-title">Hours per Member</div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#6366f1"></div>W1 Jun 8&ndash;14</div>
    <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div>W2 Jun 15&ndash;21</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>W3 Jun 22&ndash;28</div>
  </div>
  <div class="chart-wrap">
    <div class="chart-inner">
      <canvas id="barChart" height="420"></canvas>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-title">Member Detail</div>
  <div class="sort-bar">
    <span>Sort by:</span>
    <button class="sort-btn" data-col="name">Name</button>
    <button class="sort-btn active" data-col="w3">W3</button>
    <button class="sort-btn" data-col="w2">W2</button>
    <button class="sort-btn" data-col="w1">W1</button>
    <button class="sort-btn" data-col="total">Total</button>
  </div>
  <div class="tbl-wrap">
    <table id="dataTable">
      <thead>
        <tr>
          <th data-col="name">Member</th>
          <th data-col="w1" class="w1">W1 hrs</th>
          <th data-col="w2" class="w2">W2 hrs</th>
          <th data-col="w3" class="w3 sort-desc">W3 hrs</th>
          <th data-col="total">Total hrs</th>
          <th>Flags</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<p class="generated">Generated Jun 28, 2026 &middot; Avoca AI</p>

<script>
const RAW = [
  ["Drew",        330,  885,  810,  false, false, false],
  ["Jack",        570,  540,  300,  false, false, false],
  ["Jillian",     420,   60,  270,  false, false, false],
  ["Nina",        765,  930,  600,  false, false, false],
  ["Annie",       435,  735, 1005,  false, false, false],
  ["Sissi",       555,  675,  735,  false, false, false],
  ["Isaac",       630, 1530,  765,  false, false, false],
  ["Rachel",      630,  885,  765,  false, false, false],
  ["Zach",       1265, 1165,  735,  false, false, false],
  ["Jordan",      345,  420, 1990,  false, false,  true],
  ["Valeria",     210,  510,  420,  false, false, false],
  ["Kaitlin",     720,  630,  720,  false, false, false],
  ["Isadora",     450,  225,  285,  false, false, false],
  ["Kiana",        90,  360,  315,  false, false, false],
  ["Cattien",     120,  210,  255,  false, false, false],
  ["Aditya",      180,  240,  195,  false, false, false],
  ["Kyle",        375,  345,  540,  false, false, false],
  ["Brit",        135,  270,  360,  false, false, false],
  ["Otto",         30,  540,  585,  false, false, false],
  ["Jack Muccia", 660,  570,  725,  false, false, false],
  ["Matt Spencer",645,  600,  510,  false, false, false],
  ["Clyde",      1290,  690,  535,   true, false, false],
  ["Tina",       1020,  390, 1665,  false, false,  true],
  ["Coby",        630,  840,  765,  false, false, false],
  ["Ivan",        765,  960,  690,  false, false, false],
  ["Matt Dumon",  705,  885,  515,  false, false, false],
  ["Quintin",       0,    0,    0,  false, false, false],
  ["Maggie",        0,    0,    0,  false, false, false],
  ["Jose",          0,    0,    0,  false, false, false]
];

const WEEKS = {
  w1: { label: "W1", range: "Jun 8-14",  color: "#6366f1", alpha: "rgba(99,102,241,0.85)" },
  w2: { label: "W2", range: "Jun 15-21", color: "#10b981", alpha: "rgba(16,185,129,0.85)" },
  w3: { label: "W3", range: "Jun 22-28", color: "#f59e0b", alpha: "rgba(245,158,11,0.85)"  }
};

function minsToHrs(m) { return (m / 60).toFixed(1); }

let currentSort = { col: "w3", dir: "desc" };

function getData(sortCol, sortDir) {
  let d = RAW.map(r => ({
    name: r[0], w1: r[1], w2: r[2], w3: r[3],
    warn_w1: r[4], warn_w2: r[5], warn_w3: r[6],
    total: r[1] + r[2] + r[3]
  }));
  d.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (typeof va === "string") { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    if (sortDir === "asc") return va > vb ? 1 : va < vb ? -1 : 0;
    return va < vb ? 1 : va > vb ? -1 : 0;
  });
  return d;
}

(function buildStats() {
  const active = RAW.filter(r => r[1]+r[2]+r[3] > 0);
  const avg = (wk) => active.reduce((s,r) => s + r[wk], 0) / active.length;
  const tot = (wk) => active.reduce((s,r) => s + r[wk], 0);
  const stats = [
    { label: "W1 Team Total",      value: (tot(1)/60).toFixed(0) + " hrs", sub: "avg " + (avg(1)/60).toFixed(1) + " hrs/member", color: "#6366f1" },
    { label: "W2 Team Total",      value: (tot(2)/60).toFixed(0) + " hrs", sub: "avg " + (avg(2)/60).toFixed(1) + " hrs/member", color: "#10b981" },
    { label: "W3 Team Total",      value: (tot(3)/60).toFixed(0) + " hrs", sub: "avg " + (avg(3)/60).toFixed(1) + " hrs/member", color: "#f59e0b" },
    { label: "3-Week Grand Total", value: ((tot(1)+tot(2)+tot(3))/60).toFixed(0) + " hrs", sub: active.length + " active members", color: "#e2e8f0" },
    { label: "Warn Flags",         value: RAW.filter(r => r[4]||r[5]||r[6]).length, sub: "members with >5hr single event", color: "#ef4444" }
  ];
  const grid = document.getElementById("statsGrid");
  stats.forEach(s => {
    const box = document.createElement("div");
    box.className = "stat-box";
    box.innerHTML = '<div class="stat-label">' + s.label + '<\/div>' +
      '<div class="stat-value" style="color:' + s.color + '">' + s.value + '<\/div>' +
      '<div class="stat-sub">' + s.sub + '<\/div>';
    grid.appendChild(box);
  });
})();

let chartInstance = null;
function buildChart(data) {
  const active = data.filter(d => d.w1 + d.w2 + d.w3 > 0);
  const labels = active.map(d => d.name);
  const ctx = document.getElementById("barChart").getContext("2d");
  if (chartInstance) chartInstance.destroy();
  const n = active.length;
  const canvasW = Math.max(700, n * 94 + 80);
  document.querySelector(".chart-inner").style.width = canvasW + "px";
  document.getElementById("barChart").style.width = canvasW + "px";
  chartInstance = new Chart(ctx, {
    type: "bar",
    data: {
      labels: labels,
      datasets: [
        { label: "W1 Jun 8-14",  data: active.map(d => +(d.w1/60).toFixed(2)), backgroundColor: WEEKS.w1.alpha, borderRadius: 3 },
        { label: "W2 Jun 15-21", data: active.map(d => +(d.w2/60).toFixed(2)), backgroundColor: WEEKS.w2.alpha, borderRadius: 3 },
        { label: "W3 Jun 22-28", data: active.map(d => +(d.w3/60).toFixed(2)), backgroundColor: WEEKS.w3.alpha, borderRadius: 3 }
      ]
    },
    options: {
      responsive: false,
      animation: { duration: 300 },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: "#1e2140",
          borderColor: "#252847",
          borderWidth: 1,
          titleColor: "#e2e8f0",
          bodyColor: "#94a3b8",
          callbacks: {
            label: function(ctx) { return " " + ctx.dataset.label + ": " + ctx.parsed.y.toFixed(1) + " hrs"; }
          }
        }
      },
      scales: {
        x: {
          ticks: { color: "#64748b", font: { size: 11 }, maxRotation: 45, minRotation: 35 },
          grid: { color: "#1a1d35" }
        },
        y: {
          beginAtZero: true,
          ticks: { color: "#64748b", font: { size: 11 }, callback: function(v) { return v + "h"; } },
          grid: { color: "#1a1d35" }
        }
      }
    }
  });
}

function buildTable(data) {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";
  data.forEach(function(d) {
    const flags = [
      d.warn_w1 ? '<span class="warn-cell" title="W1 event >5hrs">W1 &#9888;<\/span>' : "",
      d.warn_w2 ? '<span class="warn-cell" title="W2 event >5hrs">W2 &#9888;<\/span>' : "",
      d.warn_w3 ? '<span class="warn-cell" title="W3 event >5hrs">W3 &#9888;<\/span>' : ""
    ].filter(Boolean).join(" ");
    const tr = document.createElement("tr");
    tr.innerHTML = '<td class="name-cell">' + d.name + '<\/td>' +
      '<td class="hrs-cell w1">' + minsToHrs(d.w1) + '<\/td>' +
      '<td class="hrs-cell w2">' + minsToHrs(d.w2) + '<\/td>' +
      '<td class="hrs-cell w3">' + minsToHrs(d.w3) + '<\/td>' +
      '<td class="total-cell">' + minsToHrs(d.total) + '<\/td>' +
      '<td>' + (flags || '<span class="ok-cell">&mdash;<\/span>') + '<\/td>';
    tbody.appendChild(tr);
  });
}

function render() {
  const data = getData(currentSort.col, currentSort.dir);
  buildChart(data);
  buildTable(data);
  document.querySelectorAll(".sort-btn").forEach(function(btn) {
    btn.classList.toggle("active", btn.dataset.col === currentSort.col);
  });
  document.querySelectorAll("thead th[data-col]").forEach(function(th) {
    th.classList.remove("sort-asc", "sort-desc");
    if (th.dataset.col === currentSort.col) {
      th.classList.add(currentSort.dir === "asc" ? "sort-asc" : "sort-desc");
    }
  });
}

document.querySelectorAll(".sort-btn").forEach(function(btn) {
  btn.addEventListener("click", function() {
    const col = btn.dataset.col;
    if (currentSort.col === col) {
      currentSort.dir = currentSort.dir === "desc" ? "asc" : "desc";
    } else {
      currentSort = { col: col, dir: col === "name" ? "asc" : "desc" };
    }
    render();
  });
});

document.querySelectorAll("thead th[data-col]").forEach(function(th) {
  th.addEventListener("click", function() {
    const col = th.dataset.col;
    if (currentSort.col === col) {
      currentSort.dir = currentSort.dir === "desc" ? "asc" : "desc";
    } else {
      currentSort = { col: col, dir: col === "name" ? "asc" : "desc" };
    }
    render();
  });
});

render();
</script>
</body>
</html>
